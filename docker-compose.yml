services:
   app:
      platform: linux/amd64
      container_name: elsass-compta
      image: dockerhub.graphandco.com/elsass-compta:latest
      build:
         context: .
         dockerfile: Dockerfile
         tags:
            - dockerhub.graphandco.com/elsass-compta:1.0.0
            - dockerhub.graphandco.com/elsass-compta:latest
         args:
            NEXT_PUBLIC_WP_GRAPHQL: ${NEXT_PUBLIC_WP_GRAPHQL}
            NEXT_PUBLIC_MATOMO_URL: ${NEXT_PUBLIC_MATOMO_URL}
            NEXT_PUBLIC_MATOMO_SITE_ID: ${NEXT_PUBLIC_MATOMO_SITE_ID}
      pull_policy: always
      restart: unless-stopped
      env_file:
         - .env
      networks:
         - web-network

      # Sécurité de base (Hardening)
      cpus: 0.5
      mem_limit: 512m
      security_opt:
         - no-new-privileges:true
      tmpfs:
         - /tmp:rw,noexec,nosuid,size=128m
      volumes:
         - next_cache:/app/.next/cache

      # Logs maîtrisés
      logging:
         driver: "json-file"
         options:
            max-size: "10m"
            max-file: "3"

volumes:
   next_cache:

networks:
   web-network:
      external: true

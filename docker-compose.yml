services:
   app:
      container_name: elsass-compta
      image: ghcr.io/graphandco/elsass-compta:latest
      # Sans ça, Docker réutilise l’ancienne image locale même si `latest` a été repoussé sur GHCR.
      pull_policy: always
      # build:
      #    context: .
      #    dockerfile: Dockerfile
      restart: unless-stopped
      env_file:
         - .env
      networks:
         - web-network

      # Sécurité de base (Hardening)
      cpus: 0.5
      mem_limit: 512m
      security_opt:
         - no-new-privileges:true
      tmpfs:
         - /tmp:rw,noexec,nosuid,size=128m
      volumes:
         - next_cache:/app/.next/cache

      # Logs maîtrisés
      logging:
         driver: "json-file"
         options:
            max-size: "10m"
            max-file: "3"

volumes:
   next_cache:

networks:
   web-network:
      external: true
